<!DOCTYPE html>
<html>
<head>
  <title>RantauFlow Dashboard</title>
</head>
<body style="
font-family:sans-serif;
padding:30px;
background:#031f4a;
max-width:1000px;
margin:auto;
">

<div style="display:flex; align-items:center; margin-bottom:20px;">

  <div style="
    width:32px;
    height:32px;
    border-radius:10px;
    background:rgba(76,255,136,.15);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#4cff88;
    font-weight:700;
    margin-right:10px;
  ">
    RF
  </div>

  <h1 style="color:#bfc0d1; margin:0;">
    RantauFlow
  </h1>

</div>


<!-- ================= TOP CARDS ================= -->
<div style="display:flex; gap:16px; margin-bottom:25px;">

  <div id="balanceCard"
style="
flex:1;
padding:24px;
border-radius:28px;

background:linear-gradient(
180deg,
#10192d 0%,
#182443 68%,
#63f3ff 100%
);

box-shadow:
0 10px 35px rgba(0,255,220,.12),
inset 0 1px 1px rgba(255,255,255,.06);

overflow:hidden;
">

<div style="
font-size:34px;
font-weight:900;
line-height:1;
margin:16px 0 20px 0;
letter-spacing:-2.5px;
color:#ffffff;
text-shadow:0 0 18px rgba(255,255,255,.15);
">
Total Cash
</div>

<h1 id="balance"
style="
font-size:46px;
font-weight:700;
line-height:1;
margin:12px 0;
color:#4cff88;
">
</h1>

<canvas id="cashTrend"
height="70">
</canvas>

<div style="
height:6px;
background:rgba(255,255,255,.1);
border-radius:10px;
margin-top:10px;
overflow:hidden;
">
<div id="spendBar" style="
height:100%;
background:#ff5c5c;
width:0%;
"></div>
</div>

<div style="
display:flex;
justify-content:space-between;
margin-top:18px;
font-size:16px;
opacity:.85;
">

<span id="savingRate">
Saving Rate --
</span>

<span id="cashStatus"
style="
background:rgba(255,255,255,.18);
padding:6px 14px;
border-radius:18px;
">
Growing
</span>

</div>

</div>

  <div style="
  flex:1;
  background:linear-gradient(135deg,#102a63,#1e40af);
  color:white;
  padding:20px;
  border-radius:18px;">
    <h4 style="color:#cbd5ff;">Income</h4>
    <h2 id="income" style="color:#4ade80;"></h2>
  </div>

  <div style="
  flex:1;
  background:linear-gradient(135deg,#102a63,#1e40af);
  color:white;
  padding:20px;
  border-radius:18px;">
    <h4 style="color:#cbd5ff;">Expense</h4>
    <h2 id="expense" style="color:#f87171;"></h2>
  </div>

</div>



<!-- ================= TOP CATEGORY ================= -->
<div style="
margin-bottom:20px;
padding:20px;
background:#08254d;
border:1px solid #334155;
border-radius:14px;
color:white;
">
<h3>Top Category</h3>
<p id="topCategory"></p>
</div>



<!-- ================= INSIGHT ================= -->
<div style="
margin-bottom:20px;
padding:20px;
background:#08254d;
border:1px solid #334155;
border-radius:14px;
color:white;
">
<h3>Insight</h3>
<p id="insight"></p>
</div>



<!-- ================= CHAT INPUT ================= -->
<div style="
margin-bottom:20px;
padding:20px;
background:#08254d;
border:1px solid #334155;
border-radius:14px;
color:white;
">

<div id="healthCard" style="
margin-top:20px;
padding:20px;
background:#08254d;
border:1px solid #334155;
border-radius:14px;
color:white;
">

<h3>Financial Health Score</h3>

<div id="healthScore"
style="
font-size:32px;
font-weight:bold;
margin-top:10px;
color:#22c55e;
">
--
</div>

<div id="healthStatus"
style="
margin-top:8px;
opacity:.9;
">
🔴 Finansial lagi freestyle.
</div>
</div>

<!-- ================= TRANSACTION SECTION ================= -->
<div style="margin-top:25px;">

  <!-- INPUT -->
  <h3 style="margin-bottom:10px;">Tambah Transaksi</h3>

  <div id="chatBox" style="
    height:200px;
    overflow-y:auto;
    background:rgba(255,255,255,.04);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  "></div>

  <!-- INPUT + BUTTON -->
  <div style="display:flex; gap:10px; margin-bottom:25px;">

    <input
      id="textInput"
      placeholder="contoh: makan 20k"
      style="
        flex:1;
        padding:12px;
        border-radius:10px;
        border:none;
        outline:none;
        background:#0f1b33;
        color:white;
      "
    >

    <button onclick="sendData()" style="
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#4cff88;
      font-weight:600;
      cursor:pointer;
    ">
      Kirim
    </button>

    <button onclick="askAI()" style="
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#4cff88;
      color:black;
      font-weight:600;
      cursor:pointer;
    ">
      Tanya AI
    </button>

  </div>

  <!-- ================= RECENT ACTIVITY ================= -->
  <h3 style="margin-bottom:10px;">Recent Activity</h3>

  <div id="history" style="
    background:rgba(255,255,255,.04);
    border-radius:14px;
    overflow:hidden;
  "></div>

</div>

<!-- QUICK ACTION CHIPS (BARU TARUH SINI) -->
<div style="
margin-top:12px;
display:flex;
gap:8px;
flex-wrap:wrap;
">

<button onclick="quickAdd('makan 20k')"
style="
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
">
+ Makan 20k
</button>

<button onclick="quickAdd('grab 30k')"
style="
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
">
+ Grab 30k
</button>

<button onclick="quickAsk('keuangan gue gimana')"
style="
background:#0f766e;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
">
Cek Duit Gue
</button>

<button onclick="quickAsk('roast cashflow')"
style="
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:18px;
cursor:pointer;
">
🔥 Roast Cashflow
</button>

</div>



<!-- ================= CHART ================= -->
<div style="
padding:20px;
background:#08254d;
border:1px solid #334155;
border-radius:14px;
color:white;
">
<h3>Pengeluaran</h3>

<div style="
background:#08254d;
padding:20px;
border-radius:14px;
margin-top:15px;
">
<canvas id="myChart"></canvas>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

 async function loadData() {

const insight = await fetch(
"http://localhost:3001/insight"
).then(r=>r.json());

document.getElementById("insight").innerHTML =
insight.insight.join("<br>");

const summary = await fetch(
"http://localhost:3001/summary"
).then(r=>r.json());

const historyBox = document.getElementById("history");

historyBox.innerHTML = "";

summary.recent.forEach(tx=>{
  historyBox.innerHTML += `
  <div style="
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,.1);
  ">
    <span>${tx.category}</span>
    <span style="color:#ff6b6b;">
      - Rp${tx.amount.toLocaleString("id-ID")}
    </span>
  </div>
  `;
});

if(summary.recurring?.length){
document.getElementById("insight").innerHTML +=
"<br><br>"+summary.recurring.join("<br>");
}

document.getElementById("balance").innerText =
(summary.balance || 0).toLocaleString("id-ID");

let savingRate=
Math.round(
((summary.income-summary.expense)
/summary.income)*100
);

document.getElementById(
"savingRate"
).innerText=
"Saving Rate "+savingRate+"%";

if(savingRate>30){
document.getElementById("cashStatus").innerText=
"🟢 Growing";
}
else if(savingRate>10){
document.getElementById("cashStatus").innerText=
"🟡 Stable";
}
else{
document.getElementById("cashStatus").innerText=
"🔴 Burn Mode";
}

document.getElementById("savingRate").innerText=
"Saving Rate "+savingRate+"%";

document.getElementById("income").innerText =
(summary.income || 0).toLocaleString("id-ID");

document.getElementById("expense").innerText =
(summary.expense || 0).toLocaleString("id-ID");

document.getElementById("healthScore").innerText =
summary.healthScore + "/100";

const top = await fetch(
"http://localhost:3001/top-category"
).then(r=>r.json());

document.getElementById("topCategory").innerText =
top.category + " Rp" +
Number(top.total).toLocaleString("id-ID");

const categoryData = await fetch(
"http://localhost:3001/summary/category"
).then(r=>r.json());

document.getElementById(
"healthScore"
).innerText =
summary.healthScore + "/100";

if(summary.healthScore>=75){
document.getElementById("healthStatus").innerText=
"🟢 Sehat. Dompet masih napas.";
}

else if(summary.healthScore>=55){
document.getElementById("healthStatus").innerText=
"🟡 Lumayan waras.";
}

else if(summary.healthScore>=35){
document.getElementById("healthStatus").innerText=
"🟠 Risky bro.";
}

else{
document.getElementById("healthStatus").innerText=
"🔴 Finansial lagi freestyle.";
}

const format=(n)=>
new Intl.NumberFormat("id-ID").format(n);

document.getElementById("income").innerText=format(insight.income);
document.getElementById("expense").innerText=format(insight.expense);
document.getElementById("balance").innerText=format(insight.balance);

document.getElementById("topCategory").innerText=
`${top.category} Rp${format(top.total)}`;

document.getElementById("insight").innerText=
insight.insight?.join(", ") || "No insight";

const balanceEl=document.getElementById("balance");

if(insight.balance<0){
 balanceEl.style.color="#ff6b6b";
}else{
 balanceEl.style.color="#22c55e";
}


// chart
const labels=categoryData.data.map(i=>i.category);
const values=categoryData.data.map(i=>i.total);

const ctx = document
.getElementById("myChart")
.getContext("2d");

if(window.myChartInstance){
window.myChartInstance.destroy();
}

window.myChartInstance=new Chart(ctx,{
type:"pie",
data:{
labels: labels.map(l=>{
const map={
food:"Makan",
transport:"Transport",
shopping:"Belanja",
lifestyle:"Nongkrong",
other:"Lainnya"
};
return map[l] || l;
}),
datasets:[{
data: values,
borderColor:"#08254d",
borderWidth:2,
backgroundColor:[
"#FF6384",
"#36A2EB",
"#FFCE56",
"#4BC0C0",
"#9966FF"
]
}]
},

options:{
plugins:{
legend:{
labels:{
color:"#dbeafe",
font:{
size:12
}
}
}
}
}

});

const trendCtx =
document.getElementById("cashTrend");

if(window.cashLine){
window.cashLine.destroy();
}

window.cashLine =
new Chart(trendCtx,{
type:"line",
data:{
labels:["W1","W2","W3","W4"],
datasets:[{
data:[14,18,17,24,21,29],
borderColor:"#66f6ff",
borderWidth:4,
pointRadius:0,
fill:false,
tension:.55
}]
},
options:{
plugins:{
legend:{display:false}
},
scales:{
x:{display:false},
y:{display:false}
}
}
});

}



// ================= SEND DATA =================

async function sendData(){

const input=document.getElementById("textInput");
const text=input.value.trim();

if(!text) return;

const chatBox=document.getElementById("chatBox");

const userMsg=document.createElement("div");
userMsg.innerText=text;
userMsg.style.alignSelf="flex-end";
userMsg.style.background="#3b82f6";
userMsg.style.color="white";
userMsg.style.padding="8px 12px";
userMsg.style.borderRadius="10px";

chatBox.appendChild(userMsg);

const typing=document.createElement("div");
typing.innerText="typing...";
typing.style.opacity="0.6";

chatBox.appendChild(typing);

try{

const res=await fetch(
"http://localhost:3001/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId:localStorage.getItem("userId")
})
}
);

const data=await res.json();

await new Promise(r=>setTimeout(r,500));

typing.remove();

const botMsg=document.createElement("div");
botMsg.innerText=data.message || "Saved";
botMsg.style.background="#163b73";
botMsg.style.color="white";
botMsg.style.padding="10px 14px";
botMsg.style.borderRadius="12px";
botMsg.style.padding="8px 12px";
botMsg.style.borderRadius="10px";

chatBox.appendChild(botMsg);

}
catch(err){

typing.remove();

const errorMsg=document.createElement("div");
errorMsg.innerText="Error bro coba lagi";
errorMsg.style.color="red";

chatBox.appendChild(errorMsg);

}

chatBox.scrollTop=chatBox.scrollHeight;

input.value="";
loadData();

}



// ================= ASK AI =================

async function askAI(){

const text=document.getElementById("textInput").value.trim();

if(!text) return;

const chatBox=document.getElementById("chatBox");

const userMsg=document.createElement("div");
userMsg.innerText=text;
userMsg.style.alignSelf="flex-end";
userMsg.style.background="#3b82f6";
userMsg.style.color="white";
userMsg.style.padding="8px 12px";
userMsg.style.borderRadius="10px";

chatBox.appendChild(userMsg);


const typing=document.createElement("div");
typing.innerText="AI mikir...";
typing.style.opacity="0.6";

chatBox.appendChild(typing);

try{

const res=await fetch(
"http://localhost:3001/chat-ai",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text,
userId:localStorage.getItem("userId")
})
}
);

const data=await res.json();

typing.remove();

const botMsg=document.createElement("div");
botMsg.innerText=data.reply;

botMsg.style.background="#102a56";
botMsg.style.color="white";
botMsg.style.padding="10px 14px";
botMsg.style.borderRadius="12px";
botMsg.style.alignSelf="flex-start";
botMsg.style.maxWidth="75%";

chatBox.appendChild(botMsg);

}
catch(err){

typing.remove();

const errorMsg=document.createElement("div");
errorMsg.innerText="AI error bro";
errorMsg.style.color="red";

chatBox.appendChild(errorMsg);

console.log(err);

}

chatBox.scrollTop=chatBox.scrollHeight;

document.getElementById("textInput").value="";

loadData();

// ===== render chart =====

const labels=categoryData.data.map(x=>x.category);
const totals=categoryData.data.map(x=>x.total);

console.log(labels,totals);

const canvas=document.getElementById("expenseChart");

if(window.myChart){
window.myChart.destroy();
}

window.myChart=new Chart(canvas,{
type:"doughnut",
data:{
labels:labels,
datasets:[{
data:totals
}]
}
});

}

function quickAdd(text){
document.getElementById("textInput").value=text;
sendData();
}

function quickAsk(text){
document.getElementById("textInput").value=text;
askAI();
}


loadData();
</script>

</body>
</html>
