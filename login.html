<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#070B14">
  <link rel="manifest" href="/manifest.json">
  
  <title>RantauFlow - Access</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #070B14;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --accent-green: #34D399;
      --accent-blue: #38BDF8;
      --accent-red: #F87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.08), transparent 40%),
        radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.05), transparent 40%);
      color: var(--text-main);
      padding: 20px; /* Memberi jarak agar card tidak mentok pinggir di HP */
    }

    /* GLASS CARD */
    .glass-card {
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      border-radius: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      position: relative;
    }

    /* LOGO */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo-box {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-green);
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.1);
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* FORM & INPUT */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 16px; /* Wajib 16px agar iOS Safari tidak auto-zoom */
      transition: all 0.3s ease;
      outline: none;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: var(--bg-dark);
      background: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 52px; /* Pas untuk ukuran jempol */
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 255, 255, 0.1);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* LINKS & MESSAGES */
    .auth-links {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-links a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
      cursor: pointer;
    }

    .auth-links a:hover {
      color: #7DD3FC;
    }

    #msg {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      min-height: 20px;
    }

    /* ========================================================
    MOBILE-FIRST CSS (Media Queries)
    ======================================================== */
    @media screen and (max-width: 480px) {
      .glass-card {
        padding: 40px 24px; /* Mengurangi padding agar form lebih luas di layar sempit */
        border-radius: 20px;
      }
      .brand {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <div class="logo-wrap">
      <div class="logo-box">RF</div>
      <div class="brand">RantauFlow</div>
      <div class="sub">Intelligent Financial System</div>
    </div>

    <div class="form-group">
      <input id="email" type="email" placeholder="Email address" autocomplete="off" />
      <input id="password" type="password" placeholder="Password" />
    </div>

    <button id="actionBtn" onclick="loginUser()">Access Account</button>

    <div class="auth-links">
      Belum punya akun? <a onclick="registerUser()">Daftar Sekarang</a>
    </div>

    <p id="msg"></p>
  </div>

  <script>
    const btn = document.getElementById("actionBtn");
    const msgBox = document.getElementById("msg");

    function showMessage(text, isError = false) {
      msgBox.innerText = text;
      msgBox.style.color = isError ? "var(--accent-red)" : "var(--accent-green)";
    }

    async function registerUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        return showMessage("Email dan password harus diisi.", true);
      }

      btn.disabled = true;
      btn.innerText = "Membuat Akun...";
      msgBox.innerText = "";

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          showMessage("Akun berhasil dibuat! Silakan Access Account.");
        } else {
          showMessage("Gagal membuat akun. Email mungkin sudah terdaftar.", true);
        }
      } catch (error) {
        showMessage("Terjadi kesalahan server.", true);
      } finally {
        btn.disabled = false;
        btn.innerText = "Access Account";
      }
    }

    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        return showMessage("Email dan password harus diisi.", true);
      }

      btn.disabled = true;
      btn.innerText = "Mengautentikasi...";
      msgBox.innerText = "";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          // Menyimpan userId dan status Pro ke localStorage agar terbaca di index.html
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("isPro", data.isPro || "0"); 
          
          showMessage("Berhasil masuk. Mengarahkan...");
          setTimeout(() => { window.location = "index.html"; }, 800);
        } else {
          showMessage("Kredensial salah atau tidak ditemukan.", true);
          btn.disabled = false;
          btn.innerText = "Access Account";
        }
      } catch (error) {
        showMessage("Terjadi kesalahan server. Coba lagi.", true);
        btn.disabled = false;
        btn.innerText = "Access Account";
      }
    }
  </script>

</body>
</html>
